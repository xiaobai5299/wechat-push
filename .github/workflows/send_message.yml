name: 分时段新闻推送

on:
  repository_dispatch:
    types: [afternoon-push, morning-push]
  workflow_dispatch:
    inputs:
      push_mode:
        description: '推送模式'
        required: true
        type: choice
        options:
          - afternoon
          - morning

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests

      - name: 午盘推送
        if: github.event.action == 'afternoon-push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_mode == 'afternoon')
        env:
          PUSH_MODE: afternoon
          WECHAT_CORPID: ${{ secrets.WECHAT_CORPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_AGENTID: ${{ secrets.WECHAT_AGENTID }}
          WECHAT_TOUSER: ${{ secrets.WECHAT_TOUSER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python daily_news_push.py

      - name: 盘前推送
        if: github.event.action == 'morning-push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_mode == 'morning')
        env:
          PUSH_MODE: morning
          WECHAT_CORPID: ${{ secrets.WECHAT_CORPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_AGENTID: ${{ secrets.WECHAT_AGENTID }}
          WECHAT_TOUSER: ${{ secrets.WECHAT_TOUSER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python daily_news_push.py
